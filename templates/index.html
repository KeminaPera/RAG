<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档向量检索系统</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-upload {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);
        }
        .btn-query {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        .btn-query:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(67, 233, 123, 0.4);
        }
        .features {
            margin-top: 30px;
            text-align: left;
        }
        .features ul {
            list-style: none;
            padding: 0;
        }
        .features li {
            padding: 8px 0;
            color: #555;
            padding-left: 25px;
            position: relative;
        }
        .features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #43e97b;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 文档向量检索系统</h1>
        <p>基于 LangChain 和 ChromaDB 的智能文档检索平台</p>
        
        <div>
            <a href="/upload" class="btn btn-upload">📤 上传文档</a>
            <a href="/query" class="btn btn-query">🔍 查询文档</a>
        </div>
        
        <div class="features">
            <h3>功能特性</h3>
            <ul>
                <li>支持 PDF 和 Word 文档上传</li>
                <li>自动将文档转换为向量存储</li>
                <li>基于语义相似度的智能检索</li>
                <li>实时返回相关文档片段</li>
            </ul>
        </div>
    </div>
</body>
</html>
